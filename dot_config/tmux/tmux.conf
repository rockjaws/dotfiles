# ── General ────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 10000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
set -g focus-events on

# — Status bar ————————————————————————————————————
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-left-length 40
set -g status-right-length 50
set -g status-justify left

set -g status-left ""
set -g status-right "#[reverse,bold] %H:%M #[noreverse]  %d/%m/%Y "

set -g window-status-format " #I:#W "
set -g window-status-current-format "#[reverse,bold] #I:#W #[noreverse]"
set -g window-status-separator ""

# ── Pane navigation (Alt + hjkl, no prefix) ───────────────────
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Also support Alt+arrow
bind -n M-Left  select-pane -L
bind -n M-Down  select-pane -D
bind -n M-Up    select-pane -U
bind -n M-Right select-pane -R

# ── Splits (intuitive keys) ────────────────────────────────────
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Reload config ──────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Theme (sourced dynamically by apply_theme.sh) ─────────────
source-file ~/.config/tmux/current_theme.conf
