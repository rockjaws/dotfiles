add_newline = true
command_timeout = 1000

format = """
$directory\
$git_branch\
$git_status\
$line_break\
$character"""

[character]
success_symbol = "[❯](fg:green bold)"
error_symbol = "[❯](fg:red bold)"
vimcmd_symbol = "[❮](fg:yellow bold)"

[directory]
style = "fg:cyan bold"
read_only = " "
read_only_style = "fg:red bold"
truncation_length = 4
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = " "
style = "fg:purple bold"
format = "[$symbol$branch]($style) "

[git_status]
style = "fg:red bold"
format = "([$all_status$ahead_behind]($style) )"

conflicted = "=${count} "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
up_to_date = ""
untracked = "?${count} "
stashed = "\\$${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "»${count} "
deleted = "✘${count} "
